[station]
id = "station_01"
name = "North Paddock"
# Station coordinates — required for the BirdNET geographic/seasonal range filter.
# latitude = -37.8136
# longitude = 144.9631

[audio]
chunk_seconds = 3

[[audio.sources]]
type = "rtsp"
name = "nofth_feeder"
url = "rtsp://192.168.1.132:8554/north_feeder"
transport = "tcp"
# sample_rate = 48000
# channels = 1

# [[audio.sources]]
# type = "rtsp"
# name = "south_dam"
# url = "rtsp://192.168.1.101:554/stream1"

# [[audio.sources]]
# type = "local"
# name = "usb_mic"
# device = "M-Track Duo"

# eBird taxonomy for resolving common names and species codes.
# Required for Perch (labels are bare scientific names like "Tyto_alba").
# Also enriches BirdNET detections with eBird species codes.
# Download: curl -o ebird-taxonomy.csv "https://api.ebird.org/v2/ref/taxonomy/ebird?fmt=csv"
# [taxonomy]
# ebird_path = "/home/toby/.local/share/birda/taxonomy/ebird-taxonomy.csv"

# Uncomment to enable BirdNET inference.
# Install models with: birda models install birdnet-v24
[inference.birdnet]
model_path = "/home/toby/.local/share/birda/models/birdnet-v24.onnx"
labels_path = "/home/toby/.local/share/birda/models/birdnet-v24-en.txt"
min_confidence = 0.25
top_k = 10
# Geographic/seasonal range filter using the BirdNET meta-model.
# Requires [station] latitude and longitude above.
# Drops species with occurrence probability below meta_threshold for today's date.
# meta_model_path = "/home/toby/.local/share/birda/models/birdnet-v24-meta.onnx"
# meta_threshold = 0.01

# Uncomment to enable Perch inference (32 kHz, 5s windows, 1536-dim embeddings).
# Runs as a second consumer alongside BirdNET. Incoming 48 kHz audio is
# resampled to 32 kHz in-process via rubato (Fft, 5s windows, 3s stride).
# Install model with: birda models install perch-v2
[inference.perch]
model_path = "/home/toby/.local/share/birda/models/perch-v2.onnx"
labels_path = "/home/toby/.local/share/birda/models/perch-v2.csv"
min_confidence = 0.25
top_k = 10

# Download from https://www.birds.cornell.edu/clementschecklist/introduction/updateindex/october-2025/2025-citation-checklist-downloads/
[taxonomy]
ebird_path = "/home/toby/.local/share/birda/taxonomy/eBird-Clements_v2025-integrated-checklist-October-2025.csv"