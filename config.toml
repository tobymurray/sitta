[station]
id = "station_01"
name = "North Feeder"
latitude = 44.5868
longitude = -76.0283

[audio]
chunk_seconds = 3

[[audio.sources]]
type = "rtsp"
name = "north_feeder"
url = "rtsp://192.168.1.132:8554/north_feeder"
transport = "tcp"
